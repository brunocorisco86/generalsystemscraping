version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: piscicultura_postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DBNAME}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "${PG_PORT}:5432"
    restart: unless-stopped

  bot_biometria:
    build:
      context: .
      dockerfile: src/bots/biometria/Dockerfile
    container_name: bot_biometria
    # Passa o arquivo .env para o container
    env_file:
      - .env
    # Sobrescreve o host para apontar para o container do postgres
    environment:
      - PG_HOST=postgres
    depends_on:
      - postgres
    restart: unless-stopped

  bot_qualidade_agua:
    build:
      context: .
      dockerfile: src/bots/qualidade_agua/Dockerfile
    container_name: bot_qualidade_agua
    env_file:
      - .env
    environment:
      - PG_HOST=postgres
    depends_on:
      - postgres
    restart: unless-stopped

# Volumes persistentes configurados via diretório local
